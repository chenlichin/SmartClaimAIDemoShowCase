<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <script>
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { originalFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch(e) {
          console.warn("Could not redefine fetch:", e);
        }
      })();
    </script>
